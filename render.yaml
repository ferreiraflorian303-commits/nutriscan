services:
  - type: web
    name: nutriscan-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_PIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
